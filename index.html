<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAO SALES</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f3f6;
}

.header{
background:#131921;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.logo{
color:#ff9900;
font-size:30px;
font-weight:bold;
}

.search{
flex:1;
padding:10px;
border:none;
border-radius:5px;
}

.banner{
background:#232f3e;
color:white;
text-align:center;
padding:40px;
font-size:30px;
font-weight:bold;
}

.categories{
display:flex;
justify-content:center;
gap:15px;
padding:15px;
flex-wrap:wrap;
}

.cat{
background:white;
padding:10px 20px;
border-radius:8px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:15px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
}

.product img{
width:180px;
height:180px;
object-fit:contain;
}

.price{
color:#B12704;
font-size:22px;
font-weight:bold;
}

.btn{
width:100%;
padding:10px;
margin-top:5px;
border:none;
cursor:pointer;
font-weight:bold;
}

.cart{
background:#FFD814;
}

.wish{
background:#e7e7e7;
}

.buy{
background:#FFA41C;
}

.footer{
background:#131921;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">RAO SALES</div>

<input class="search"
type="text"
placeholder="Search products...">
</div>

<div class="banner">
Welcome to RAO SALES
</div>

<div class="categories">
<div class="cat">📱 Mobiles</div>
<div class="cat">🎧 Earbuds</div>
<div class="cat">⌚ Watches</div>
<div class="cat">🔋 Accessories</div>
</div>

<div class="products">

<div class="product">
<img src="a16.jpg">
<h3>Samsung Galaxy A16</h3>
<p class="price">₹15,999</p>
<p>⭐⭐⭐⭐☆ 4.3/5</p>
<button class="btn cart">Add to Cart</button>
<button class="btn wish">Wishlist</button>
<button class="btn buy">Buy Now</button>
</div>

<div class="product">
<img src="boat.jpg">
<h3>boAt Airdopes 141</h3>
<p class="price">₹1,299</p>
<p>⭐⭐⭐⭐⭐ 4.5/5</p>
<button class="btn cart">Add to Cart</button>
<button class="btn wish">Wishlist</button>
<button class="btn buy">Buy Now</button>
</div>

<div class="product">
<img src="watch.jpg">
<h3>Noise Smart Watch</h3>
<p class="price">₹1,999</p>
<p>⭐⭐⭐⭐☆ 4.2/5</p>
<button class="btn cart">Add to Cart</button>
<button class="btn wish">Wishlist</button>
<button class="btn buy">Buy Now</button>
</div>

</div>

<div class="footer">
© 2026 RAO SALES | Cash on Delivery Available
</div>

</body>
</html>

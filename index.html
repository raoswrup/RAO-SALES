<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAO SALES</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f3f6;
}

header{
    background:#131921;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#ff9900;
}

.search{
    width:50%;
    padding:10px;
    border:none;
    border-radius:5px;
}

.cart{
    font-size:20px;
}

.banner{
    background:linear-gradient(90deg,#2874f0,#ff9900);
    color:white;
    text-align:center;
    padding:50px;
}

.banner h1{
    font-size:50px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
}

button{
    width:100%;
    padding:10px;
    background:#ff9900;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
    margin-top:10px;
}

button:hover{
    background:#e68a00;
}

footer{
    background:#131921;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:20px;
}
</style>
</head>
<body>

<header>
    <div class="logo">RAO SALES</div>
    <input type="text" class="search" placeholder="Search Products...">
    <div class="cart">🛒 Cart (<span id="count">0</span>)</div>
</header>

<section class="banner">
    <h1>RAO SALES</h1>
    <p>India's Smart Shopping Store</p>
</section>

<section class="products">
<div class="card">
    <img src="a16.jpg"
alt="Samsung Galaxy A16">
    <div class="card-content">
        <h3>Samsung Galaxy 
A16</h3> 
        <p
class="price">₹14,999</p>
        <button
onclick="addToCart()">Add to
Cart</button>
    </div>
</div>
    <div class="card">
        <img src="https://picsum.photos/300/220?1">
        <div class="card-content">
            <h3>Smartphone</h3>
            <p class="price">₹19,999</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/220?2">
        <div class="card-content">
            <h3>Laptop</h3>
            <p class="price">₹59,999</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/220?3">
        <div class="card-content">
            <h3>Headphones</h3>
            <p class="price">₹2,499</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/220?4">
        <div class="card-content">
            <h3>Smart Watch</h3>
            <p class="price">₹4,999</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

</section>

<footer>
    © 2026 RAO SALES | All Rights Reserved
</footer>

<script>
let cart=0;

function addToCart(){
    cart++;
    document.getElementById("count").innerText=cart;
    alert("Product Added to Cart!");
}
</script>

</body>
</html>
